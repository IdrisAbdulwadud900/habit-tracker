<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discipline Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-card: #242424;
            --text-primary: #e8e8e8;
            --text-secondary: #999;
            --accent: #ff6b35;
            --accent-dim: #ff6b3520;
            --success: #4ade80;
            --border: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Welcome Screen */
        #welcome-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        #welcome-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, var(--accent-dim), transparent 50%),
                radial-gradient(circle at 80% 80%, var(--accent-dim), transparent 50%);
            opacity: 0.3;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.5; }
        }

        .welcome-content {
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-content h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .welcome-content p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .start-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 107, 53, 0.4);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        /* Main App */
        #app {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 1rem;
        }

        header h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.5rem, 4vw, 2rem);
            margin-bottom: 0.5rem;
        }

        .date {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Streak Display */
        .streak-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .streak-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transform: scaleX(var(--streak-progress, 0));
            transform-origin: left;
            transition: transform 0.5s ease;
        }

        .streak-number {
            font-family: 'Space Mono', monospace;
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .streak-label {
            font-size: 1.1rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        /* Add Habit Form */
        .add-habit-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .habit-input-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .habit-input-group input {
            flex: 1;
            min-width: 200px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.9rem 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .habit-input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .habit-input-group input::placeholder {
            color: var(--text-secondary);
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: #ff7d4d;
            transform: translateY(-1px);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        /* Habits List */
        .habits-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .habit-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .habit-card:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .habit-checkbox {
            appearance: none;
            width: 28px;
            height: 28px;
            border: 2px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .habit-checkbox:checked {
            background: var(--success);
            border-color: var(--success);
        }

        .habit-checkbox:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .habit-info {
            flex: 1;
        }

        .habit-name {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .habit-streak {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-family: 'Space Mono', monospace;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        .delete-btn:hover {
            color: #ef4444;
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .empty-state small {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .habit-input-group {
                flex-direction: column;
            }

            .habit-input-group input {
                min-width: 100%;
            }

            .add-btn {
                width: 100%;
            }

            .habit-card {
                padding: 1.25rem;
            }

            .streak-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Welcome Screen -->
    <div id="welcome-screen">
        <div class="welcome-content">
            <h1>Stop Lying to Yourself</h1>
            <p>Track what you actually do. Not what you plan to do.</p>
            <button class="start-btn" onclick="startApp()">Start Tracking</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="app">
        <header>
            <h1>Discipline Tracker</h1>
            <div class="date" id="current-date"></div>
        </header>

        <!-- Streak Display -->
        <div class="streak-container">
            <div class="streak-number" id="streak-number">0</div>
            <div class="streak-label">Day Streak</div>
        </div>

        <!-- Add Habit -->
        <div class="add-habit-section">
            <div class="habit-input-group">
                <input 
                    type="text" 
                    id="habit-input" 
                    placeholder="What do you need to do today?"
                    onkeypress="if(event.key==='Enter') addHabit()"
                >
                <button class="add-btn" onclick="addHabit()">Add Habit</button>
            </div>
        </div>

        <!-- Habits List -->
        <div class="habits-container" id="habits-list">
            <div class="empty-state">
                <p>No habits yet.</p>
                <small>Add one above to start your streak</small>
            </div>
        </div>
    </div>

    <script>
        // Data structure
        let habits = [];
        let streak = 0;
        let lastCheckDate = null;

        // Initialize app
        function initApp() {
            loadData();
            updateDate();
            checkStreak();
            renderHabits();
        }

        // Start app (hide welcome, show main)
        function startApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            initApp();
        }

        // Update current date
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);
            document.getElementById('current-date').textContent = today;
        }

        // Add new habit
        function addHabit() {
            const input = document.getElementById('habit-input');
            const habitName = input.value.trim();

            if (!habitName) return;

            const habit = {
                id: Date.now(),
                name: habitName,
                completed: false,
                streak: 0,
                lastCompleted: null,
                createdAt: new Date().toISOString()
            };

            habits.push(habit);
            input.value = '';
            saveData();
            renderHabits();
        }

        // Toggle habit completion
        function toggleHabit(id) {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;

            const today = new Date().toDateString();
            
            habit.completed = !habit.completed;

            if (habit.completed) {
                // Check if this is the first completion today
                if (habit.lastCompleted !== today) {
                    habit.streak++;
                    habit.lastCompleted = today;
                }
            } else {
                // Unchecking - reduce streak if it was completed today
                if (habit.lastCompleted === today) {
                    habit.streak = Math.max(0, habit.streak - 1);
                    habit.lastCompleted = null;
                }
            }

            saveData();
            checkStreak();
            renderHabits();
        }

        // Delete habit
        function deleteHabit(id) {
            if (!confirm('Delete this habit?')) return;
            
            habits = habits.filter(h => h.id !== id);
            saveData();
            checkStreak();
            renderHabits();
        }

        // Check and update overall streak
        function checkStreak() {
            const today = new Date().toDateString();
            
            if (habits.length === 0) {
                streak = 0;
                updateStreakDisplay();
                return;
            }

            // Check if all habits are completed today
            const allCompleted = habits.every(h => h.lastCompleted === today);
            
            if (allCompleted && habits.length > 0) {
                // Check if streak should continue
                if (lastCheckDate !== today) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = yesterday.toDateString();

                    if (lastCheckDate === yesterdayStr || lastCheckDate === null) {
                        streak++;
                    } else {
                        // Streak broken, reset
                        streak = 1;
                    }
                    lastCheckDate = today;
                }
            } else {
                // Not all habits completed
                if (lastCheckDate && lastCheckDate !== today) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    const yesterdayStr = yesterday.toDateString();
                    
                    // Check if streak is broken
                    if (lastCheckDate !== yesterdayStr) {
                        streak = 0;
                        lastCheckDate = null;
                    }
                }
            }

            updateStreakDisplay();
            saveData();
        }

        // Update streak display
        function updateStreakDisplay() {
            const streakEl = document.getElementById('streak-number');
            streakEl.textContent = streak;
            
            // Update progress bar
            const maxStreak = 30; // Arbitrary max for visual
            const progress = Math.min(streak / maxStreak, 1);
            document.querySelector('.streak-container').style.setProperty('--streak-progress', progress);
        }

        // Render habits list
        function renderHabits() {
            const container = document.getElementById('habits-list');
            
            if (habits.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No habits yet.</p>
                        <small>Add one above to start your streak</small>
                    </div>
                `;
                return;
            }

            container.innerHTML = habits.map(habit => `
                <div class="habit-card">
                    <input 
                        type="checkbox" 
                        class="habit-checkbox"
                        ${habit.completed ? 'checked' : ''}
                        onchange="toggleHabit(${habit.id})"
                    >
                    <div class="habit-info">
                        <div class="habit-name">${escapeHtml(habit.name)}</div>
                        <div class="habit-streak">${habit.streak} day${habit.streak !== 1 ? 's' : ''} in a row</div>
                    </div>
                    <button class="delete-btn" onclick="deleteHabit(${habit.id})">×</button>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Save to localStorage
        function saveData() {
            localStorage.setItem('habits', JSON.stringify(habits));
            localStorage.setItem('streak', streak);
            localStorage.setItem('lastCheckDate', lastCheckDate);
        }

        // Load from localStorage
        function loadData() {
            const savedHabits = localStorage.getItem('habits');
            const savedStreak = localStorage.getItem('streak');
            const savedLastCheck = localStorage.getItem('lastCheckDate');

            if (savedHabits) habits = JSON.parse(savedHabits);
            if (savedStreak) streak = parseInt(savedStreak);
            if (savedLastCheck) lastCheckDate = savedLastCheck;

            // Reset daily completion status
            const today = new Date().toDateString();
            habits.forEach(habit => {
                if (habit.lastCompleted !== today) {
                    habit.completed = false;
                }
            });
        }
    </script>
</body>
</html>
